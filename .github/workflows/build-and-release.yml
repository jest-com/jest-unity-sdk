name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag/version (e.g. v1.1.0)"
        required: true
      release_notes:
        description: "Additional release notes (optional)"
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      UNITY_VERSION: 2022.3.62f3
      REGRESSION_BUILD_DIR: build/jest-unity-sdk-regression-webgl
      REGRESSION_ZIP: jest-unity-sdk-regression-webgl.zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}

      - name: Validate package.json
        run: |
          if [ ! -f "package.json" ]; then
            echo "❌ package.json not found at repo root"
            exit 1
          fi
          VERSION=$(jq -r '.version' package.json)
          echo "📦 Package version: $VERSION"

      - name: Get version from package.json
        id: meta
        run: |
          echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Read CHANGELOG
        id: changelog
        run: |
          # Extract the latest version's changelog entry
          CHANGELOG=$(awk '/^## \[/{if(p) exit; p=1} p' CHANGELOG.md | tail -n +2)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          docker-images: true
          large-packages: false

      - name: Build Unity SDK regression WebGL fixture
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: RegressionWebGL~
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: WebGL
          buildMethod: com.jest.sdk.regression.Editor.JestSdkRegressionBuild.BuildWebGL
          customParameters: -outputPath /github/workspace/${{ env.REGRESSION_BUILD_DIR }}

      - name: Package Unity SDK regression WebGL fixture
        run: |
          if [ ! -d "${REGRESSION_BUILD_DIR}" ]; then
            echo "Expected WebGL build output not found at ${REGRESSION_BUILD_DIR}"
            find . -maxdepth 4 -type f \( -name index.html -o -name "*.loader.js" \) -print
            exit 1
          fi
          cd "${REGRESSION_BUILD_DIR}"
          zip -r "${GITHUB_WORKSPACE}/${REGRESSION_ZIP}" .

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          draft: false
          files: ${{ env.REGRESSION_ZIP }}
          body: |
            ## Installation

            Add via Unity Package Manager:
            ```
            https://github.com/${{ github.repository }}.git#${{ inputs.tag_name }}
            ```

            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}

            ${{ inputs.release_notes }}

      - name: Upload regression fixture to published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ env.REGRESSION_ZIP }}
